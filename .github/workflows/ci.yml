name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install libvips for sharp
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      # Dependencias de raíz (frontend) y de backend (los tests unit las necesitan)
      - run: npm ci
      - run: npm ci --prefix backend

      - run: npm run lint
      - run: npm run build

      # PERF-001: budget de tamaño de bundle (falla si un chunk supera el presupuesto).
      - run: npm run perf:budget

      # Tests UNIT reales (sin BD). Los de integración NO corren en CI: requieren
      # una BD de test y se protegen del uso accidental contra producción
      # (guard en backend/db.js con NODE_ENV=test).
      - run: npm run test

  # DB-001: valida que el baseline del esquema reconstruye producción DESDE CERO
  # en un Postgres limpio y efímero (contenedor), sin depender de ninguna
  # infraestructura externa. Si el baseline deja de restaurar, el CI se pone rojo.
  db-baseline-restore:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          # BD efímera solo accesible dentro del job; auth trust (sin credenciales).
          # Evita literales de credenciales en el repo.
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: baseline_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # BD efímera solo del job; el guard de db.js la permite (no es host Supabase).
      DATABASE_URL: postgresql://postgres@localhost:5432/baseline_check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install libvips for sharp
        run: sudo apt-get update && sudo apt-get install -y libvips-dev
      - run: npm ci --prefix backend

      - name: Preparar roles Supabase (stubs) y extensiones
        run: |
          # El baseline incluye políticas RLS que referencian roles gestionados por
          # Supabase (p. ej. "authenticated"). En un Postgres vanilla hay que crearlos
          # como stubs sin login para que el restore no falle.
          psql -h localhost -U postgres -d baseline_check -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE anon NOLOGIN;" \
            -c "CREATE ROLE authenticated NOLOGIN;" \
            -c "CREATE ROLE service_role NOLOGIN;" \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;" \
            -c "CREATE SCHEMA IF NOT EXISTS auth;" \
            -c "CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS 'SELECT NULL::uuid';"

      - name: Restaurar baseline en Postgres limpio
        run: |
          psql -h localhost -U postgres -d baseline_check -v ON_ERROR_STOP=1 \
            -f backend/db/baseline/app_schema_baseline.sql

      - name: Verificar objetos restaurados
        run: |
          TABLES=$(psql -h localhost -U postgres -d baseline_check -tAc \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='app' AND table_type='BASE TABLE'")
          FUNCS=$(psql -h localhost -U postgres -d baseline_check -tAc \
            "SELECT count(*) FROM information_schema.routines WHERE routine_schema='app'")
          FKS=$(psql -h localhost -U postgres -d baseline_check -tAc \
            "SELECT count(*) FROM information_schema.table_constraints WHERE table_schema='app' AND constraint_type='FOREIGN KEY'")
          echo "Restaurado -> tablas app: $TABLES | funciones: $FUNCS | FKs: $FKS"
          test "$TABLES" -ge 120 || { echo "Esperaba >=120 tablas, obtuve $TABLES"; exit 1; }

      # DB-001 (PR 2): ejercita el runner sobre la BD restaurada DESDE CERO. El baseline
      # ya contiene el esquema completo, así que adoptamos el ledger con `baseline`
      # (marca las migraciones como aplicadas SIN re-ejecutarlas: evita doble aplicación)
      # y exigimos que `migrate:check` quede limpio (0 pendientes / 0 checksum divergente).
      # Prueba que la adopción del runner sobre un restore es reproducible y sin drift.
      - name: Adoptar ledger y verificar que queda limpio
        run: |
          npm --prefix backend run migrate:baseline
          npm --prefix backend run migrate:check

  # CI-001: tests de INTEGRACIÓN contra una BD efímera (postgres:17) restaurada
  # desde el baseline. No toca producción y no necesita un Supabase de staging.
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # BD de test efímera; el guard de db.js permite este host (no es Supabase).
      DATABASE_URL: postgresql://postgres@localhost:5432/app_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --prefix backend

      - name: Preparar stubs Supabase y restaurar baseline
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE anon NOLOGIN;" \
            -c "CREATE ROLE authenticated NOLOGIN;" \
            -c "CREATE ROLE service_role NOLOGIN;" \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;" \
            -c "CREATE SCHEMA IF NOT EXISTS auth;" \
            -c "CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS 'SELECT NULL::uuid';" \
            -f backend/db/baseline/app_schema_baseline.sql \
            -f backend/migrations/20260717_workout_schedule_unique_plan_user_date.sql \
            -f backend/migrations/20260718_auth001_refresh_rotativo.sql \
            -f backend/migrations/20260720_add_consent_columns_users.sql

      - name: Aplicar migraciones CrossFit v2 dos veces (idempotencia)
        run: |
          for pass in 1 2; do
            echo "CrossFit migration pass $pass"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
              -f backend/migrations/20260722_crossfit_v2_assessments.sql \
              -f backend/migrations/20260722_crossfit_v2_catalog.sql \
              -f backend/migrations/20260722_crossfit_v2_nutrition_day_types.sql \
              -f backend/migrations/20260722_crossfit_v2_results_autoreg.sql \
              -f backend/migrations/20260722_crossfit_v2_runtime_events.sql \
              -f backend/migrations/20260722_crossfit_v2_plan_revisions.sql
          done

      - name: Tests de integración (BD efímera)
        run: npm --prefix backend run test:integration

  crossfit-v2-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: crossfit_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/crossfit_e2e
      NODE_ENV: test
      JWT_SECRET: crossfit-e2e-ephemeral-only
      PORT: 3010
      E2E_LOCAL_DB: "1"
      QA_BASE: http://localhost:3010
      E2E_BASE_URL: http://localhost:4173
      CROSSFIT_V2_GENERATION: "true"
      CROSSFIT_V2_RESULTS: "true"
      CROSSFIT_EMITS_TRAINING_LOAD: "false"
      CROSSFIT_NUTRITION_LOAD: "false"
      ADMIN_TOKEN: crossfit-e2e-admin-ephemeral-only
      BRIDGE_OUTBOX_EMIT_ENABLED: "false"
      BRIDGE_OUTBOX_WORKER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npx playwright install --with-deps chromium

      - name: Restaurar baseline y aplicar CrossFit v2
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE anon NOLOGIN;" \
            -c "CREATE ROLE authenticated NOLOGIN;" \
            -c "CREATE ROLE service_role NOLOGIN;" \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;" \
            -c "CREATE SCHEMA IF NOT EXISTS auth;" \
            -c "CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS 'SELECT NULL::uuid';" \
            -f backend/db/baseline/app_schema_baseline.sql \
            -f backend/migrations/20260717_workout_schedule_unique_plan_user_date.sql \
            -f backend/migrations/20260718_auth001_refresh_rotativo.sql \
            -f backend/migrations/20260720_add_consent_columns_users.sql \
            -f backend/migrations/20260722_crossfit_v2_assessments.sql \
            -f backend/migrations/20260722_crossfit_v2_catalog.sql \
            -f backend/migrations/20260722_crossfit_v2_nutrition_day_types.sql \
            -f backend/migrations/20260722_crossfit_v2_results_autoreg.sql \
            -f backend/migrations/20260722_crossfit_v2_runtime_events.sql \
            -f backend/migrations/20260722_crossfit_v2_plan_revisions.sql
          CROSSFIT_CATALOG_DATABASE_URL="$DATABASE_URL" \
            CROSSFIT_CATALOG_APPLY_ACK=EPHEMERAL_ONLY \
            node backend/scripts/import-crossfit-v2-catalog.mjs --apply
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "UPDATE app.crossfit_catalog_versions SET status='active', activated_at=NOW() WHERE status='draft';"
          CROSSFIT_CATALOG_DATABASE_URL="$DATABASE_URL" \
            CROSSFIT_CATALOG_APPLY_ACK=EPHEMERAL_ONLY \
            node backend/scripts/import-crossfit-v2-catalog.mjs --apply

      - name: Compilar frontend contra API local
        env:
          VITE_API_URL: http://localhost:3010
        run: npm run build

      - name: E2E CrossFit desktop y móvil
        run: |
          npm --prefix backend start > /tmp/crossfit-backend.log 2>&1 &
          BACKEND_PID=$!
          npm run preview -- --host localhost --port 4173 --strictPort > /tmp/crossfit-frontend.log 2>&1 &
          FRONTEND_PID=$!
          cleanup() {
            kill "$BACKEND_PID" "$FRONTEND_PID" 2>/dev/null || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 45); do
            curl -sf http://localhost:3010/api/health >/dev/null \
              && curl -sf http://localhost:4173/login >/dev/null \
              && break
            sleep 2
          done
          curl -sf http://localhost:3010/api/health >/dev/null
          curl -sf http://localhost:4173/login >/dev/null
          npm run test:crossfit:e2e

      - name: Publicar evidencia E2E si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crossfit-v2-e2e-failure
          path: |
            playwright-report/
            test-results/
            /tmp/crossfit-backend.log
            /tmp/crossfit-frontend.log

  # DEP-001: gate de seguridad de dependencias + SBOM CycloneDX.
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install libvips for sharp
        run: sudo apt-get update && sudo apt-get install -y libvips-dev
      - run: npm ci
      - run: npm ci --prefix backend

      # Gate DURO: PRODUCCIÓN no puede introducir vulnerabilidades high/critical.
      - name: Audit producción (raíz)
        run: npm audit --omit=dev --audit-level=high
      - name: Audit producción (backend)
        run: npm --prefix backend audit --omit=dev --audit-level=high

      # Informativo: árbol completo (incluye dev tooling). No bloquea el merge; hace
      # visible la deuda de dev. Excepciones conocidas documentadas en docs/DEP-001-security.md.
      - name: Audit árbol completo (informativo)
        run: |
          echo "== raíz ==" && npm audit || true
          echo "== backend ==" && npm --prefix backend audit || true

      # SBOM CycloneDX (raíz y backend) como artefactos del build.
      - name: Generar SBOM raíz (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom-root.json
      - name: Generar SBOM backend (CycloneDX)
        working-directory: backend
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file ../sbom-backend.json
      - name: Subir SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-root.json
            sbom-backend.json

  # QA-001: auditoría de accesibilidad (axe) sobre las páginas públicas del build.
  a11y-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install libvips for sharp
        run: sudo apt-get update && sudo apt-get install -y libvips-dev
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - name: Servir build y auditar a11y
        env:
          A11Y_BASE_URL: http://localhost:4173
          AUDIT_BASE_URL: http://localhost:4173
        run: |
          npx vite preview --port 4173 &
          for i in $(seq 1 30); do curl -sf http://localhost:4173/login >/dev/null && break || sleep 2; done
          npm run test:a11y
          npm run test:audit-ui
